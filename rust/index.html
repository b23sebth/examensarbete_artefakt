<!doctype html>
<html lang="SV">
	<head>
		<meta charset="utf-8"/>
		<title>Rust Create Element</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <script src="../js/contextfreegrammar.js" defer></script> <!-- Downloaded from https://github.com/LenaSYS/ContextFreeLib/blob/master/js/contextfreegrammar.js -->
    <script src="../js/seededrandom.js" defer></script> <!-- Downloaded from https://github.com/LenaSYS/Random-Number-Generator/blob/master/seededrandom.js -->
    <script src ="../js/script.js" defer></script>
	</head>
	<body>
		<script type="module">
      import init, { start } from "./pkg/rust.js";

      let stats = [];
      let csv = "";

      const seed = 1;
      const elementsToCreate = 1000; //How many elements that should be created, download via "Download JSON" button
      const runs = 10; //Number of runs:

      //TODO: Gör det till en async funktion som använder await init()
      //istället för att ha allting här
      init().then(() => {
        console.log("Wasm loaded");


        //submitBtnRust is declared in ../js/script.js
        submitBtnRust.addEventListener("click", function(event) {
          event.preventDefault();

          let run = 1;

          for (let i = 0; i < runs; i++) {

            const startTime = Temporal.Now.plainTimeISO();

            start();

            const endTime = Temporal.Now.plainTimeISO();

            addStatsData(run, elementsToCreate, seed, startTime, endTime);
            run++;
          }

          if (autoDownload)downloadData();

        });

        const downloadJsonButton = document.getElementById("download-json-btn");
        downloadJsonButton.addEventListener("click", function() {

          generateTestData(elementsToCreate, seed);
          console.log(testData);

          const blob = new Blob([JSON.stringify(testData, null, 2)], {type: "application/json"});
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");

          a.href = url;
          a.download = `data_${elementsToCreate}_elements.json`;

          a.click();
          a.remove();

        });

      });

		</script>

    <div id="config">
      
      <form method="get" id="element-options">
        <h1>Rust Version</h1>

        <div>
          <p>The Rust version of the program needs to be changed manually.</p>
          <div>
            <label for="autoDownload">Autodownload?</label>
            <input id ="autoDownload" type="checkbox" name="autoDownload"/>
          </div>

          <button type="submit" id="submit-btn-rust">Generate</button>
        </div>

      </form>

      <div id="stats">
        <h1>Stats</h1>

        <table id="stats-table">
           <thead>
            <tr>
              <th>Run#</th>
              <th>Elements Created</th>
              <th>Seed used</th>
              <th>Time taken (s)</th>
              <th>Time taken (ms)</th>
            </tr>
          </thead> 

          <tbody></tbody>
        </table>

        <button type="button" id="clear-data-btn">Clear data</button>
        <button type="button" id="download-data-btn">Download data</button>
        <button type="button" id="clear-elements-btn">Clear elements</button>
        <button type="button" id="download-json-btn">Download JSON</button>


      </div>

    </div>

    <div id="cards"></div>

	</body>
</html>
