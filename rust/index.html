<!doctype html>
<html lang="SV">
	<head>
		<meta charset="utf-8"/>
		<title>Rust Create Element</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <script src="../js/contextfreegrammar.js" defer></script> <!-- Downloaded from https://github.com/LenaSYS/ContextFreeLib/blob/master/js/contextfreegrammar.js -->
    <script src="../js/seededrandom.js" defer></script> <!-- Downloaded from https://github.com/LenaSYS/Random-Number-Generator/blob/master/seededrandom.js -->
    <script src ="../js/script.js" defer></script>
	</head>
	<body>
		<script type="module">
      import init, { start } from "./pkg/rust.js";

      const rustOptions = document.getElementById("rust-options");

      let stats = [];
      let csv = "";

      const seed = 1;
      const elementsToCreate = 1000; //How many elements that should be created, download via "Download JSON" button
      const runs = 10; //Number of runs:

      //TODO: Gör det till en async funktion som använder await init()
      //istället för att ha allting här
      init().then(() => {
        console.log("Wasm loaded");

        let autoDownloadRust;

        //submitBtnRust is declared in ../js/script.js
        submitBtnRust.addEventListener("click", function(event) {
          event.preventDefault();


          autoDownloadRust = document.getElementById("autoDownloadRust").checked;

          let run = 1;

          for (let i = 0; i < runs; i++) {

            const startTime = Temporal.Now.plainTimeISO();

            start();

            const endTime = Temporal.Now.plainTimeISO();

            addStatsData(run, elementsToCreate, seed, startTime, endTime);
            run++;
          }

          if (autoDownloadRust) downloadData();

        });

        const downloadJsonButton = document.getElementById("download-json-btn");
        downloadJsonButton.addEventListener("click", function() {

          generateTestData(elementsToCreate, seed);
          console.log(testData);

          const blob = new Blob([JSON.stringify(testData, null, 2)], {type: "application/json"});
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");

          a.href = url;
          a.download = `data_${elementsToCreate}_elements.json`;

          a.click();
          a.remove();

        });

        const checkbox = document.getElementById("rust-options-checkbox");

        const rustOptionsParagraph1 = document.createElement("p");
        const rustOptionsParagraph2 = document.createElement("p");
        const rustOptionsParagraph3 = document.createElement("p");

        let rustOptionsText = document.createTextNode(`Elements: ${elementsToCreate}`);
        rustOptionsParagraph1.appendChild(rustOptionsText);
        rustOptions.insertBefore(rustOptionsParagraph1, checkbox);

        rustOptionsText = document.createTextNode(`Seed: ${seed}`);
        rustOptionsParagraph2.appendChild(rustOptionsText);
        rustOptions.insertBefore(rustOptionsParagraph2, checkbox);

        rustOptionsText = document.createTextNode(`Runs: ${runs}`);
        rustOptionsParagraph3.appendChild(rustOptionsText);
        rustOptions.insertBefore(rustOptionsParagraph3, checkbox);
      });

		</script>

    <div id="config">
      
      <form method="get" id="element-options">
        <h1>Rust Version</h1>

        <div>
          <p>The Rust version of the program needs to be changed manually.</p>
          <div id="rust-options">
            <h2>Current options:</h2>
            <div id="rust-options-checkbox">
              <label for="autoDownloadRust">Autodownload?</label>
              <input id ="autoDownloadRust" type="checkbox" name="autoDownloadRust"/>
            </div>
          </div>

          <button type="submit" id="submit-btn-rust">Generate</button>
        </div>

      </form>

      <div id="stats">
        <h1>Stats</h1>

        <table id="stats-table">
           <thead>
            <tr>
              <th>Run#</th>
              <th>Elements Created</th>
              <th>Seed used</th>
              <th>Time taken (s)</th>
              <th>Time taken (ms)</th>
            </tr>
          </thead> 

          <tbody></tbody>
        </table>

        <button type="button" id="clear-data-btn">Clear data</button>
        <button type="button" id="download-data-btn">Download data</button>
        <button type="button" id="clear-elements-btn">Clear elements</button>
        <button type="button" id="download-json-btn">Download JSON</button>


      </div>

    </div>

    <div id="cards"></div>

	</body>
</html>
