	<body>
		<script type="module">
      import init, { run } from "./pkg/rust.js";

      //TODO: Gör det till en async funktion som använder await init()
      //istället för att ha allting här
      init().then(() => {
        console.log("Wasm loaded");

        //submitBtnRust is declared in ../js/script.js
        submitBtnRust.addEventListener("click", function(event) {
          event.preventDefault();

          const startTime = Temporal.Now.plainTimeISO();

          run();

          const endTime = Temporal.Now.plainTimeISO();

          let stats = [];
          let csv = "";

          //**Change this into the actual Rust values used!**
          addStatsData(1, 10, 1, startTime, endTime);
        });

        const downloadJsonButton = document.getElementById("download-json-btn");
        downloadJsonButton.addEventListener("click", function() {
          const seed = 1;
          const elementsToCreate = 1000;

          generateTestData(elementsToCreate, seed);
          console.log(testData);

          const blob = new Blob([JSON.stringify(testData, null, 2)], {type: "application/json"});
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");

          a.href = url;
          a.download = `data_${elementsToCreate}_elements.json`;

          a.click();
          a.remove();

        });

      });

		</script>

    <div id="config">
      
      <form method="get" id="element-options">
        <h1>Rust options</h1>

        <div>
          <label for="numberOfElements">Number of elements to create:</label>
          <input type="number" name="numberOfElements" value="10"/>

          <label for="setSeed">Seed used:</label>
          <input id ="setSeed" type="number" name="seed" value="1"/>

          <button type="submit" id="submit-btn-rust">Generate</button>
        </div>

      </form>

      <div id="stats">
        <h1>Stats</h1>

        <table id="stats-table">
           <thead>
            <tr>
              <th>Run#</th>
              <th>Elements Created</th>
              <th>Seed used</th>
              <th>Time taken (s)</th>
              <th>Time taken (ms)</th>
            </tr>
          </thead> 

          <tbody></tbody>
        </table>

        <button type="button" id="clear-data-btn">Clear data</button>
        <button type="button" id="download-data-btn">Download data</button>
        <button type="button" id="clear-elements-btn">Clear elements</button>
        <button type="button" id="download-json-btn">Download JSON</button>


      </div>

    </div>
