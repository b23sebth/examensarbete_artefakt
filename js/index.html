<!doctype html>
<html lang="SV">
	<head>
		<meta charset="utf-8"/>
		<title>JS Create Element</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <script src="seededrandom.js" defer></script> <!-- Downloaded from https://github.com/LenaSYS/Random-Number-Generator/blob/master/seededrandom.js -->
    <script src="contextfreegrammar.js" defer></script> <!-- Downloaded from https://github.com/LenaSYS/ContextFreeLib/blob/master/js/contextfreegrammar.js -->
    <script src ="script.js" defer></script>
	</head>
	<body>
    <div id="config">
      
      <form method="get" id="element-options">
        <h1>JavaScript Options</h1>

        <div>
          <label for="numberOfElements">Number of elements to create:</label>
          <input type="number" name="numberOfElements" value="10"/>

          <label for="setSeed">Seed used:</label>
          <input id ="setSeed" type="number" name="seed" value="1"/>

          <button type="submit" id="submit-btn">Generate</button>
        </div>

      </form>

      <div id="stats">
        <h1>Stats</h1>

        <table id="stats-table">
           <thead>
            <tr>
              <th>Run#</th>
              <th>Elements Created</th>
              <th>Seed used</th>
              <th>Time taken</th>
            </tr>
          </thead> 

          <tbody></tbody>
        </table>

        <button type="button" id="clear-data-btn">Clear data</button>
        <button type="button" id="download-data-btn">Download data</button>
        <button type="button" id="clear-elements-btn">Clear elements</button>


      </div>

    </div>

    <div id="cards"></div>
	</body>
</html>
