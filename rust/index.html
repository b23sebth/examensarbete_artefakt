<!doctype html>
<html lang="SV">
	<head>
		<meta charset="utf-8"/>
		<title>Rust Create Element</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <script src="../js/contextfreegrammar.js" defer></script> <!-- Downloaded from https://github.com/LenaSYS/ContextFreeLib/blob/master/js/contextfreegrammar.js -->
    <script src="../js/seededrandom.js" defer></script> <!-- Downloaded from https://github.com/LenaSYS/Random-Number-Generator/blob/master/seededrandom.js -->
	</head>
	<body>
		<script type="module">
      import init, { main } from "./pkg/rust.js";

      function getRandomWord() {
        const word = randomword(noun);
        return word;
      }

      //Returns up to n *amount* sentences with normal distribution.
      //Always at least one sentence.
      function getRandomSentence(amount) {
        let randomSentence = "";
        amount = Number(amount);
        console.log(amount);
        console.log(typeof amount);

        for (let i = 0; i < getRandomInt(1, amount + 1); i++) {
          randomSentence += generate_sentence(true,true,true,true,true,true,true,true,true,true,true);
        }

        return randomSentence;
      }

      //These are needed for Rust to be able to access them.
      window.getRandomWord = getRandomWord;
      window.getRandomSentence = getRandomSentence;

      //TODO: Gör det till en async funktion som använder await init()
      //istället för att ha allting här
      init().then(() => {
        console.log("Wasm loaded");

        console.log(main());

        const clearDataButton = document.getElementById("clear-data-btn");
        const downloadDataButton = document.getElementById("download-data-btn");
        const clearElementsButton = document.getElementById("clear-elements-btn");

        let stats = [];
        let csv = "";
        let numberOfElements;
        let run = 1;

        clearDataButton.addEventListener("click", function() {
          console.log("Clear data button pressed.");

          const table = document.getElementById("stats-table");
          const tbody = table.querySelector("tbody");

          while (tbody.firstChild) {
            tbody.removeChild(tbody.firstChild);
          }

          stats = [];
          csv = "";
          run = 1;
        });

        downloadDataButton.addEventListener("click", function() {
          console.log("Download data button pressed.");

          if (csv == "") {
            alert("Please generate some data first.");
          } else {
          //TODO: Fixa ett faktiskt <a> element istället för <button> för bättre accessibility.
          const blob = new Blob([csv], {type: "text/csv" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");

          a.href = url;
          a.download = 'stats.csv';

          a.click();
          a.remove();
          }
        });


        clearElementsButton.addEventListener("click", function() {
          console.log("Clear elements button pressed.");

          const cards = document.getElementById("cards");

          let i = 1;
          while (cards.firstChild) {
            cards.removeChild(cards.firstChild);
            console.log("Removed: ", i);
            i++;
          }

        });

      });

		</script>

    <div id="config">
      
      <form method="get" id="element-options">
        <h1>JavaScript Options</h1>

        <div>
          <label for="numberOfElements">Number of elements to create:</label>
          <input type="number" name="numberOfElements" value="10"/>

          <label for="setSeed">Seed used:</label>
          <input id ="setSeed" type="number" name="seed" value="1"/>

          <button type="submit" id="submit-btn">Generate</button>
        </div>

      </form>

      <div id="stats">
        <h1>Stats</h1>

        <table id="stats-table">
           <thead>
            <tr>
              <th>Run#</th>
              <th>Elements Created</th>
              <th>Seed used</th>
              <th>Time taken (s)</th>
              <th>Time taken (ms)</th>
            </tr>
          </thead> 

          <tbody></tbody>
        </table>

        <button type="button" id="clear-data-btn">Clear data</button>
        <button type="button" id="download-data-btn">Download data</button>
        <button type="button" id="clear-elements-btn">Clear elements</button>


      </div>

    </div>

    <div id="cards"></div>

	</body>
</html>
